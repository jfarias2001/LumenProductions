packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 11 ativa minimumReleaseAge=1440 (1 dia) por padrão, bloqueando
# pacotes recém-publicados. 0 desativa a verificação de idade.
minimumReleaseAge: 0

# pnpm 11 bloqueia scripts de build (postinstall) e trata como erro fatal
# (strictDepBuilds=true por padrão). O antigo onlyBuiltDependencies foi removido
# no v11 e substituído por allowBuilds (mapa pacote: true). Liberar os pacotes
# que precisam compilar/baixar binários nativos (argon2, esbuild, engines Prisma).
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
