packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 11 ativa minimumReleaseAge=1440 (1 dia) por padrão, bloqueando
# pacotes recém-publicados. 0 desativa a verificação de idade.
minimumReleaseAge: 0

# pnpm 10+ bloqueia scripts de build (postinstall) por padrão e o pnpm 11
# trata isso como erro fatal. Liberar os pacotes que precisam compilar/baixar
# binários nativos (argon2, esbuild, engines do Prisma).
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - argon2
  - esbuild
  - msgpackr-extract
  - prisma
